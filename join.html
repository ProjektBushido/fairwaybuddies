<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a Fairway Buddies Crew</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #07170d, #123f24);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(18px);
    }

    .icon {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      background: #2ecc71;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    p {
      color: rgba(255, 255, 255, 0.78);
      font-size: 17px;
      line-height: 1.5;
      margin: 16px 0 26px;
    }

    .button {
      display: block;
      background: #2ecc71;
      color: #06130a;
      text-decoration: none;
      font-weight: 800;
      font-size: 17px;
      padding: 15px 18px;
      border-radius: 16px;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: #35df7d;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">⛳️</div>

    <h1>Join a Fairway Buddies Crew</h1>

    <p>
      You’ve been invited to join a golf crew. Download Fairway Buddies,
      create an account, and open the invite link again to join.
    </p>

    <a
      class="button"
      href="https://apps.apple.com/app/fairway-buddies/id6752227564"
    >
      Download on the App Store
    </a>

    <div class="small">
      Already have the app? Open this link on your iPhone.
    </div>
  </main>
</body>
</html>
